name: CI

on:
  push:
    branches: [master, develop]
  pull_request:

permissions:
  contents: read

env:
  PHP_EXTENSIONS: bcmath, ctype, curl, dom, gd, iconv, intl, mbstring, openssl, pdo_mysql, simplexml, soap, sodium, xsl, zip

jobs:
  gitleaks:
    name: Security / gitleaks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trufflehog:
    name: Security / trufflehog
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: TruffleHog
        uses: trufflesecurity/trufflehog@27b0417c16317ca9a472a9a8092acce143b49c55 # v3.95.9
        with:
          path: ./
          extra_args: --results=verified,unknown

  composer-audit:
    name: Security / composer audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup PHP
        uses: shivammathur/setup-php@b604ade2a87db23f8871b7182e69ec5e75effb45 # v2
        with:
          php-version: '8.3'
          extensions: ${{ env.PHP_EXTENSIONS }}
          coverage: none

      - name: Use Mage-OS mirror
        run: composer config repositories.magento composer https://repo.mage-os.org/

      - name: Install dependencies
        run: composer update --no-interaction --no-progress --prefer-dist --no-scripts

      - name: Composer dependency audit
        run: composer audit --no-dev --format=table --abandoned=report

  phpcs:
    name: Lint / phpcs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup PHP
        uses: shivammathur/setup-php@b604ade2a87db23f8871b7182e69ec5e75effb45 # v2
        with:
          php-version: '8.3'
          extensions: ${{ env.PHP_EXTENSIONS }}
          coverage: none

      - name: Use Mage-OS mirror
        run: composer config repositories.magento composer https://repo.mage-os.org/

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-8.3-${{ hashFiles('composer.json') }}
          restore-keys: composer-8.3-

      - name: Install dependencies
        run: composer update --no-interaction --no-progress --prefer-dist --no-scripts

      - name: Run phpcs
        run: composer phpcs

  phpstan:
    name: Lint / phpstan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup PHP
        uses: shivammathur/setup-php@b604ade2a87db23f8871b7182e69ec5e75effb45 # v2
        with:
          php-version: '8.3'
          extensions: ${{ env.PHP_EXTENSIONS }}
          coverage: none

      - name: Use Mage-OS mirror
        run: composer config repositories.magento composer https://repo.mage-os.org/

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-8.3-${{ hashFiles('composer.json') }}
          restore-keys: composer-8.3-

      - name: Install dependencies
        run: composer update --no-interaction --no-progress --prefer-dist --no-scripts

      - name: Run phpstan
        run: composer phpstan

  tests:
    name: Tests / PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4', '8.5']
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup PHP
        uses: shivammathur/setup-php@b604ade2a87db23f8871b7182e69ec5e75effb45 # v2
        with:
          php-version: ${{ matrix.php }}
          extensions: ${{ env.PHP_EXTENSIONS }}
          coverage: none

      - name: Use Mage-OS mirror
        run: composer config repositories.magento composer https://repo.mage-os.org/

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.json') }}
          restore-keys: composer-${{ matrix.php }}-

      # magento/framework platform requirement tops out below 8.5;
      # module code targets 8.5 ahead of official Magento support
      - name: Install dependencies
        run: |
          FLAGS=""
          if [ "${{ matrix.php }}" = "8.5" ]; then
            FLAGS="--ignore-platform-req=php+"
          fi
          composer update --no-interaction --no-progress --prefer-dist --no-scripts $FLAGS

      - name: Run tests
        run: composer test
